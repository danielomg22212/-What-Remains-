  <text x="600" y="840" text-anchor="middle" fill="#f0e4d4" font-family="Noto Serif SC, Songti SC, SimSun, serif" font-size="112" letter-spacing="10">南方暗火</text>
  <line x1="405" y1="900" x2="795" y2="900" stroke="#d45a42" stroke-width="3"/>
  <text x="600" y="980" text-anchor="middle" fill="#a8917d" font-family="Noto Serif SC, Songti SC, SimSun, serif" font-size="34" letter-spacing="6">潇思雨</text>
  <text x="600" y="1514" text-anchor="middle" fill="#7f6d60" font-family="Noto Serif SC, Songti SC, SimSun, serif" font-size="28" letter-spacing="4">暗火不亮，但纸会发烫</text>
