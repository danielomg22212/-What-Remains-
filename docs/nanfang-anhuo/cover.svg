<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">南方暗火</title>
  <desc id="desc">深色封面，暗红火线、档案纸和终端提示构成的小说封面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15110f"/>
      <stop offset="0.48" stop-color="#2a1c18"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5c1613"/>
      <stop offset="0.52" stop-color="#e05a3c"/>
      <stop offset="1" stop-color="#ffe0a5"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="1200" height="1800" fill="url(#bg)"/>
  <rect x="78" y="78" width="1044" height="1644" rx="22" fill="none" stroke="#6b4437" stroke-width="2" opacity="0.55"/>
  <rect x="145" y="245" width="910" height="1260" rx="12" fill="#201916" stroke="#4c332b" stroke-width="2" opacity="0.78"/>
  <path d="M192 1180 C340 1105 414 1230 546 1140 C698 1036 818 1128 1008 1048" fill="none" stroke="url(#ember)" stroke-width="11" stroke-linecap="round"/>
  <path d="M202 1217 C350 1142 426 1268 558 1178 C710 1074 832 1166 1018 1086" fill="none" stroke="#7c2019" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <path d="M230 1150 C380 1070 490 1198 604 1098 C744 974 850 1034 984 972" fill="none" stroke="#ffb05c" stroke-width="20" stroke-linecap="round" opacity="0.14" filter="url(#soft)"/>
  <g opacity="0.9">
    <rect x="226" y="1330" width="748" height="78" rx="6" fill="#110f0e" stroke="#6b4437"/>
    <text x="260" y="1382" fill="#d9c5b1" font-family="Consolas, monospace" font-size="28">UNMATCHED PRINTABLE PROJECT</text>
  </g>
  <g opacity="0.72">
    <rect x="222" y="388" width="230" height="310" rx="8" fill="#d8c9b5"/>
    <rect x="486" y="388" width="230" height="310" rx="8" fill="#c6b49e"/>
    <rect x="750" y="388" width="230" height="310" rx="8" fill="#bda991"/>
    <line x1="260" y1="460" x2="414" y2="460" stroke="#5e5146" stroke-width="8"/>
    <line x1="260" y1="505" x2="390" y2="505" stroke="#5e5146" stroke-width="5"/>
    <line x1="524" y1="460" x2="678" y2="460" stroke="#5e5146" stroke-width="8"/>
    <line x1="524" y1="505" x2="662" y2="505" stroke="#5e5146" stroke-width="5"/>
    <line x1="788" y1="460" x2="942" y2="460" stroke="#5e5146" stroke-width="8"/>
    <line x1="788" y1="505" x2="914" y2="505" stroke="#5e5146" stroke-width="5"/>
