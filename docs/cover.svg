  <line x1="103" y1="1137" x2="312" y2="1137" stroke="#6e251e" stroke-width="2" opacity="0.9"/>
  <rect x="482" y="82" width="310" height="610" rx="8" fill="#171717" stroke="#39332c" stroke-width="3"/>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#3d3732"/>
    <stop offset="0.5" stop-color="#5f4431"/>
