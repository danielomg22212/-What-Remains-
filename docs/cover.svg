<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1350" role="img" aria-labelledby="title desc">
  <title id="title">《后来如何》封面</title>
  <desc id="desc">档案室、台灯、旧纸与窗外路灯组成的文学封面。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151412"/>
      <stop offset="0.48" stop-color="#24201b"/>
      <stop offset="1" stop-color="#0f0f0e"/>
    </linearGradient>
    <radialGradient id="lamp" cx="62%" cy="62%" r="34%">
      <stop offset="0" stop-color="#e4b86d" stop-opacity="0.72"/>
      <stop offset="0.45" stop-color="#9b6a38" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="900" height="1350" fill="url(#bg)"/>
  <rect width="900" height="1350" filter="url(#grain)" opacity="0.42"/>
  <rect x="35" y="35" width="830" height="1280" fill="none" stroke="#5a4435" stroke-width="2" opacity="0.55"/>
  <rect x="68" y="70" width="365" height="1210" fill="#1b1916" stroke="#41362f" stroke-width="1.5"/>
