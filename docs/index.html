<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后来如何</title>
  <meta name="description" content="《后来如何》在线阅读">
  <meta name="robots" content="index,follow,noarchive">
  <link rel="stylesheet" href="styles.css?v=20260604-cover-entry-fix">
</head>
<body class="cover-active">
  <section id="coverScreen" class="cover-screen" aria-label="作品封面">
    <div class="cover-shell">
      <div class="cover-card">
        <img src="cover.svg" alt="" class="cover-image" aria-hidden="true">
      </div>
      <div class="cover-actions">
        <a id="startReading" href="#reader">开始阅读</a>
        <a id="openTocFromCover" href="#tocList">目录</a>
      </div>
    </div>
  </section>

  <header class="topbar">
    <div>
      <h1>后来如何</h1>
      <p>潇思雨</p>
    </div>
    <div class="tools" aria-label="阅读设置">
      <button id="decreaseFont" type="button" title="减小字号">A-</button>
      <button id="increaseFont" type="button" title="增大字号">A+</button>
      <button id="toggleFontFamily" type="button" title="切换字体">宋体</button>
      <button id="toggleToc" type="button" title="显示/隐藏目录">隐藏目录</button>
      <button id="toggleMode" type="button" title="切换连续/翻页">翻页</button>
      <button id="toggleTheme" type="button" title="切换明暗">明/暗</button>
    </div>
  </header>

  <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

  <main id="layout" class="layout">
    <nav class="toc" aria-label="章节目录">
      <h2>目录</h2>
      <div id="tocList">载入中...</div>
    </nav>
    <section class="reading-column">
      <article id="reader" class="reader" aria-live="polite">
        <p class="loading">正在载入正文...</p>
      </article>
      <div id="pager" class="pager" hidden>
        <button id="prevPage" type="button">上一页</button>
        <span id="pageInfo">1 / 1</span>
        <button id="nextPage" type="button">下一页</button>
      </div>
    </section>
  </main>

  <script>
    const reader = document.getElementById('reader');
    const coverScreen = document.getElementById('coverScreen');
    const tocList = document.getElementById('tocList');
    const progressBar = document.getElementById('progressBar');
    const pager = document.getElementById('pager');
    const pageInfo = document.getElementById('pageInfo');
    const toggleModeButton = document.getElementById('toggleMode');
    const toggleTocButton = document.getElementById('toggleToc');
    const toggleFontFamilyButton = document.getElementById('toggleFontFamily');
    const layout = document.getElementById('layout');
    const root = document.documentElement;
    let novelText = '';
    let pages = [];
    let pageCount = 1;
    let readingMode = localStorage.getItem('readingMode') || 'scroll';
    let currentPage = Number(localStorage.getItem('currentPage') || 0);
    let tocHidden = localStorage.getItem('tocHidden') === 'true';
    let touchStartX = 0;
    let touchStartY = 0;
    let lastSwipeAt = 0;
    let chromeTimer = null;
    const fontFamilies = ['serif', 'hei', 'kai'];
    const fontLabels = { serif: '宋体', hei: '黑体', kai: '楷体' };

    function hasClass(element, name) {
      return (` ${element.getAttribute('class') || ''} `).indexOf(` ${name} `) >= 0;
    }

    function addClass(element, name) {
      if (!hasClass(element, name)) element.setAttribute('class', `${element.getAttribute('class') || ''} ${name}`.trim());
    }

    function removeClass(element, name) {
      element.setAttribute('class', (` ${element.getAttribute('class') || ''} `).replace(` ${name} `, ' ').trim());
    }

    function setClass(element, name, enabled) {
      if (enabled) addClass(element, name);
      else removeClass(element, name);
    }

    function enterReader(showControls = false) {
      removeClass(document.body, 'cover-active');
      setChromeVisible(showControls);
      if (showControls) {
        applyTocState(false);
      }
    }

    function slugify(text, index) {
      return `chapter-${index}-${text.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]+/g, '-').replace(/^-|-$/g, '')}`;
    }

    function plainHeading(line) {
      return line.replace(/^#{1,6}\s*/, '').trim();
    }

    function addTocLink(toc, element, text, className) {
      const link = document.createElement('a');
      link.href = `#${element.id}`;
      link.textContent = text;
      if (className) link.className = className;
      link.dataset.sourceIndex = String(pages.length - 1);
      link.addEventListener('click', (event) => {
        if (readingMode === 'page') {
          event.preventDefault();
          showPage(findDisplayPageBySource(Number(link.dataset.sourceIndex || 0)));
        }
      });
      toc.appendChild(link);
    }

    function renderInlineMarkdown(text) {
      const fragment = document.createDocumentFragment();
      const parts = text.split(/(\*\*[^*]+\*\*|`[^`]+`)/g).filter(Boolean);
      parts.forEach((part) => {
        if (part.startsWith('**') && part.endsWith('**')) {
          const strong = document.createElement('strong');
          strong.textContent = part.slice(2, -2);
          fragment.appendChild(strong);
        } else if (part.startsWith('`') && part.endsWith('`')) {
          const code = document.createElement('code');
          code.textContent = part.slice(1, -1);
          fragment.appendChild(code);
        } else {
          fragment.appendChild(document.createTextNode(part));
        }
      });
      return fragment;
    }

    function pushNode(node) {
      if (!pages.length) {
        pages.push({ title: '封面', id: 'cover', nodes: [] });
      }
      pages[pages.length - 1].nodes.push(node);
    }

    function startPage(title, id) {
      pages.push({ title, id, nodes: [] });
    }

    function renderText(text) {
      const lines = text.replace(/\r\n/g, '\n').split('\n');
      const toc = document.createDocumentFragment();
      let chapterIndex = 0;
      pages = [];

      lines.forEach((line) => {
        const trimmed = line.trim();
        if (!trimmed) {
          return;
        }

        const heading = /^(#{1,6})\s+(.+)$/.exec(trimmed);
        if (heading) {
          const level = heading[1].length;
          const titleText = plainHeading(trimmed);

          if (level === 1) {
            const title = document.createElement('div');
            title.className = 'book-title';
            title.textContent = titleText;
            pushNode(title);
            return;
          }

          if (level === 2 && titleText.startsWith('作者：')) {
            const byline = document.createElement('div');
            byline.className = 'byline';
            byline.textContent = titleText;
            pushNode(byline);
            return;
          }

          const tag = level <= 2 ? 'h2' : 'h3';
          const el = document.createElement(tag);
          el.textContent = titleText;
          el.id = slugify(titleText, chapterIndex++);
          startPage(titleText, el.id);
          pushNode(el);

          const isChapter = /^第.+章/.test(titleText);
          const isMajor = titleText === '序' || titleText.startsWith('上：') || titleText.startsWith('下：') || titleText === '创作谈' || titleText === '创作声明';
          if (isChapter || isMajor) {
            addTocLink(toc, el, titleText, isChapter ? 'chapter-link' : 'section-link');
          }
          return;
        }

        if (trimmed === '序' || trimmed.startsWith('上：') || trimmed.startsWith('下：')) {
          const h2 = document.createElement('h2');
          h2.textContent = trimmed;
          h2.id = slugify(trimmed, chapterIndex++);
          startPage(trimmed, h2.id);
          pushNode(h2);
          addTocLink(toc, h2, trimmed, 'section-link');
          return;
        }

        if (/^第.+章\s/.test(trimmed)) {
          const h3 = document.createElement('h3');
          h3.textContent = trimmed;
          h3.id = slugify(trimmed, chapterIndex++);
          startPage(trimmed, h3.id);
          pushNode(h3);
          addTocLink(toc, h3, trimmed, 'chapter-link');
          return;
        }

        if (trimmed.startsWith('《') && trimmed.endsWith('》')) {
          const title = document.createElement('div');
          title.className = 'book-title';
          title.textContent = trimmed;
          pushNode(title);
          return;
        }

        if (trimmed.startsWith('作者：')) {
          const byline = document.createElement('div');
          byline.className = 'byline';
          byline.textContent = trimmed;
          pushNode(byline);
          return;
        }

        const p = document.createElement('p');
        p.appendChild(renderInlineMarkdown(trimmed));
        pushNode(p);
      });

      if (!pages.length) pages.push({ title: '正文', id: 'page-0', nodes: [] });
      tocList.replaceChildren(toc);
      applyMode(readingMode);
    }

    async function loadNovel() {
      try {
        const response = await fetch('novel.txt', { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        novelText = await response.text();
        renderText(novelText);
      } catch (error) {
        reader.innerHTML = '<p class="loading">正文载入失败。请确认 novel.txt 已上传到同一目录。</p>';
        tocList.textContent = '目录载入失败';
      }
    }

    function cloneNodes(nodes) {
      return nodes.map((node) => node.cloneNode(true));
    }

    function findDisplayPageBySource(sourceIndex) {
      if (readingMode === 'page') {
        const source = pages[sourceIndex];
        const target = source ? reader.querySelector(`#${CSS.escape(source.id)}`) : null;
        const width = Math.max(1, reader.clientWidth);
        return target ? Math.max(0, Math.floor(target.offsetLeft / width)) : 0;
      }
      return 0;
    }

    function allContentNodes() {
      const nodes = [];
      pages.forEach((page) => cloneNodes(page.nodes).forEach((node) => nodes.push(node)));
      return nodes;
    }

    function renderContinuous() {
      const fragment = document.createDocumentFragment();
      pages.forEach((page) => {
        cloneNodes(page.nodes).forEach((node) => fragment.appendChild(node));
      });
      removeClass(reader, 'paged-reader');
      reader.replaceChildren(fragment);
      pager.hidden = true;
      toggleModeButton.textContent = '翻页';
      document.body.dataset.mode = 'scroll';
      setChromeVisible(false);
      updateProgress();
    }

    function renderPagedDocument() {
      const flow = document.createElement('div');
      flow.className = 'page-flow';
      allContentNodes().forEach((node) => flow.appendChild(node));
      addClass(reader, 'paged-reader');
      reader.replaceChildren(flow);
      updatePagedMetrics();
    }

    function updatePagedMetrics() {
      const flow = reader.querySelector('.page-flow');
      if (!flow) return;
      const width = Math.max(1, reader.clientWidth);
      flow.style.columnWidth = `${width}px`;
      flow.style.width = `${width}px`;
      pageCount = Math.max(1, Math.ceil(flow.scrollWidth / width));
      currentPage = Math.max(0, Math.min(currentPage, pageCount - 1));
      flow.style.transform = `translateX(${-currentPage * width}px)`;
      pageInfo.textContent = `${currentPage + 1} / ${pageCount}`;
      document.getElementById('prevPage').disabled = currentPage === 0;
      document.getElementById('nextPage').disabled = currentPage === pageCount - 1;
      updateProgress();
    }

    function showPage(index) {
      if (readingMode !== 'page') return;
      if (!reader.querySelector('.page-flow')) renderPagedDocument();
      currentPage = Math.max(0, Math.min(index, pageCount - 1));
      localStorage.setItem('currentPage', currentPage);
      updatePagedMetrics();
    }

    function applyMode(mode) {
      readingMode = mode;
      localStorage.setItem('readingMode', readingMode);
      if (readingMode === 'page') {
        pager.hidden = false;
        toggleModeButton.textContent = '连续';
        document.body.dataset.mode = 'page';
        renderPagedDocument();
        showPage(currentPage);
        setChromeVisible(false);
      } else {
        renderContinuous();
      }
    }

    function setChromeVisible(visible, autoHide = false) {
      clearTimeout(chromeTimer);
      setClass(document.body, 'chrome-hidden', !visible);
      if (visible && autoHide) {
        chromeTimer = setTimeout(() => setChromeVisible(false), 1600);
      }
    }

    function applyTocState(hidden) {
      tocHidden = hidden;
      localStorage.setItem('tocHidden', String(tocHidden));
      setClass(layout, 'toc-hidden', tocHidden);
      toggleTocButton.textContent = tocHidden ? '显示目录' : '隐藏目录';
      toggleTocButton.setAttribute('aria-pressed', String(tocHidden));
      updateProgress();
    }

    function updateProgress() {
      let ratio = 0;
      if (readingMode === 'page' && pageCount > 1) {
        ratio = currentPage / (pageCount - 1);
      } else {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - window.innerHeight;
        ratio = height > 0 ? Math.min(1, Math.max(0, scrollTop / height)) : 0;
      }
      progressBar.style.width = `${ratio * 100}%`;
    }

    document.getElementById('increaseFont').addEventListener('click', () => {
      const current = Number(localStorage.getItem('fontScale') || 1);
      const next = Math.min(1.35, current + 0.05);
      localStorage.setItem('fontScale', next);
      root.style.setProperty('--font-scale', next);
      if (readingMode === 'page') showPage(currentPage);
    });

    document.getElementById('decreaseFont').addEventListener('click', () => {
      const current = Number(localStorage.getItem('fontScale') || 1);
      const next = Math.max(0.85, current - 0.05);
      localStorage.setItem('fontScale', next);
      root.style.setProperty('--font-scale', next);
      if (readingMode === 'page') showPage(currentPage);
    });

    toggleFontFamilyButton.addEventListener('click', () => {
      const current = localStorage.getItem('fontFamily') || 'serif';
      const next = fontFamilies[(fontFamilies.indexOf(current) + 1) % fontFamilies.length];
      localStorage.setItem('fontFamily', next);
      document.body.dataset.font = next;
      toggleFontFamilyButton.textContent = fontLabels[next];
      if (readingMode === 'page') updatePagedMetrics();
    });

    document.getElementById('toggleTheme').addEventListener('click', () => {
      const next = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
      document.body.dataset.theme = next;
      localStorage.setItem('theme', next);
    });

    document.getElementById('startReading').addEventListener('click', () => {
      enterReader(false);
    });

    document.getElementById('openTocFromCover').addEventListener('click', () => {
      enterReader(true);
    });

    toggleModeButton.addEventListener('click', () => {
      applyMode(readingMode === 'page' ? 'scroll' : 'page');
    });

    toggleTocButton.addEventListener('click', () => {
      applyTocState(!tocHidden);
    });

    document.getElementById('prevPage').addEventListener('click', () => showPage(currentPage - 1));
    document.getElementById('nextPage').addEventListener('click', () => showPage(currentPage + 1));

    reader.addEventListener('touchstart', (event) => {
      if (readingMode !== 'page') return;
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    reader.addEventListener('touchend', (event) => {
      if (readingMode !== 'page') return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.4) {
        lastSwipeAt = Date.now();
        showPage(currentPage + (dx < 0 ? 1 : -1));
      }
    }, { passive: true });

    reader.addEventListener('click', (event) => {
      if (Date.now() - lastSwipeAt < 350) return;
      if (readingMode !== 'page') {
        setChromeVisible(hasClass(document.body, 'chrome-hidden'), true);
        return;
      }
      const width = reader.getBoundingClientRect().width;
      const x = event.clientX - reader.getBoundingClientRect().left;
      if (x < width * 0.28) {
        showPage(currentPage - 1);
        return;
      }
      if (x > width * 0.72) {
        showPage(currentPage + 1);
        return;
      }
      setChromeVisible(hasClass(document.body, 'chrome-hidden'), true);
    });

    window.addEventListener('resize', () => {
      if (readingMode === 'page') updatePagedMetrics();
    });

    document.addEventListener('keydown', (event) => {
      if (readingMode !== 'page') return;
      if (event.key === 'ArrowLeft') showPage(currentPage - 1);
      if (event.key === 'ArrowRight') showPage(currentPage + 1);
    });

    reader.addEventListener('copy', (event) => event.preventDefault());
    reader.addEventListener('cut', (event) => event.preventDefault());
    reader.addEventListener('contextmenu', (event) => event.preventDefault());

    root.style.setProperty('--font-scale', localStorage.getItem('fontScale') || 1);
    document.body.dataset.theme = localStorage.getItem('theme') || 'light';
    document.body.dataset.font = localStorage.getItem('fontFamily') || 'serif';
    toggleFontFamilyButton.textContent = fontLabels[document.body.dataset.font] || '宋体';
    applyTocState(tocHidden);
    window.addEventListener('scroll', updateProgress, { passive: true });
    loadNovel().then(updateProgress);
  </script>
</body>
</html>
